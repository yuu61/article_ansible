all:
  children:
    # === 会場ネットワーク機器 ===
    venue_routers:
      hosts:
        isr1100:
          ansible_host: 192.168.11.1
          ansible_network_os: cisco.ios.ios
          ansible_connection: ansible.netcommon.network_cli
    venue_switches:
      hosts:
        s3100:
          ansible_host: 192.168.11.2
          ansible_network_os: community.network.edgeswitch
          ansible_connection: ansible.netcommon.network_cli

    # === ローカルサーバ (会場内) ===
    local_services:
      hosts:
        local_dns:
          ansible_host: 192.168.11.10
        local_dhcp:
          ansible_host: 192.168.11.11
        local_grafana:
          ansible_host: 192.168.11.12
        local_snmp:
          ansible_host: 192.168.11.13
        local_syslog:
          ansible_host: 192.168.11.14

    # === EC2 サービス (AWS) ===
    ec2_services:
      hosts:
        ec2_dns:
          ansible_host: 10.0.1.10
        ec2_dhcp:
          ansible_host: 10.0.1.11
        ec2_grafana:
          ansible_host: 10.0.1.12
        ec2_syslog:
          ansible_host: 10.0.1.13

    # --- 論理グループ ---
    network_devices:
      children:
        venue_routers:
        venue_switches:
    servers:
      children:
        local_services:
        ec2_services:
    dns_servers:
      hosts:
        local_dns:
        ec2_dns:
    dhcp_servers:
      hosts:
        local_dhcp:
        ec2_dhcp:
